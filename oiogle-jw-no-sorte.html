<!DOCTYPE html><html lang="pt-BR"><head><style>

  font-family: "Optimistic";
  font-style: normal;

  src: url("/fonts/OptimisticAI_VF_Optimized.woff2") format("woff2");

</style><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>OIOgle - Navegador Regional</title>
<style>
:root{--bg:#0b0b0f;--card:#202124;--text:#e8eaed;--muted:#9aa0a6}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Roboto,Arial,sans-serif}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;position:relative}
.topbar .left{font-size:22px;cursor:pointer}
.topbar .right{display:flex;gap:20px;color:var(--muted);font-size:24px}
.topbar .right span{cursor:pointer}
.menu{position:absolute;top:48px;right:12px;background:#1f1f23;border:1px solid #3c4043;border-radius:8px;min-width:220px;display:none;z-index:100}
.menu a{display:block;padding:12px 16px;color:var(--text);text-decoration:none;font-size:14px;border-bottom:1px solid #2a2a2e}
.menu a:hover{background:#2a2a2e}
.logo{display:flex;justify-content:center;margin:60px 0 30px}
.search-wrap{padding:0 20px;max-width:600px;margin:0 auto}
.search{ background:var(--card);border:1px solid #5f6368;border-radius:28px;display:flex;align-items:center;padding:12px 16px;gap:12px}
.search input{flex:1;background:transparent;border:0;color:var(--text);font-size:16px;outline:none}
.btns{display:flex;gap:12px;justify-content:center;margin:24px 0;flex-wrap:wrap}
.btns a{background:#303134;color:var(--text);padding:10px 20px;border-radius:4px;text-decoration:none;font-size:14px;border:1px solid #5f6368}
.btns a.jw{background:#1a3a5a;border-color:#4a6fa5;color:#8ab4f8}
.trends{margin:40px auto;max-width:600px;padding:0 20px}
.trend{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid #2a2a2e;color:var(--text);text-decoration:none}
footer{padding:30px 20px;color:var(--muted);font-size:13px;text-align:center}
</style></head><body>
<div class="topbar">
<div class="left" onclick="home()">⌂</div>
<div class="right"><span onclick="nova()">＋</span><span onclick="toggleMenu()">⋮</span></div>
<div id="menu" class="menu">
<a onclick="setCidade('Itatiba')">Itatiba</a>
<a onclick="setCidade('Atibaia')">Atibaia</a>
<a onclick="setCidade('Nazaré Paulista')">Nazaré</a>
<a onclick="setCidade('Bragança Paulista')">Bragança</a>
<a href="https://www.jw.org/pt" target="_blank">www.jw.org</a>
<a onclick="trocarMotor()">Trocar motor</a>
</div>
</div>

<div class="logo">
<svg width="300" height="100" viewBox="0 0 600 180">
<text x="0" y="130" font-family="Arial Black" font-size="140" fill="#d946ef">O</text>
<text x="110" y="130" font-family="Arial Black" font-size="140" fill="#ec4899">I</text>
<text x="175" y="130" font-family="Arial Black" font-size="140" fill="#f43f5e">O</text>
<text x="260" y="130" font-family="Arial Black" font-size="140" fill="#d946ef">g</text>
<text x="360" y="130" font-family="Arial Black" font-size="140" fill="#a855f7">l</text>
<text x="420" y="130" font-family="Arial Black" font-size="140" fill="#ec4899">e</text>
</svg>
</div>

<div class="search-wrap">
<div class="search">
<svg width="20" height="20" fill="#9aa0a6" viewBox="0 0 24 24"><path d="M15.5 14h-.8l-.3-.3a6.5 6.5 0 10-.9.9l.3.3v.8l5 5 1.5-1.5-5-5z"/></svg>
<input id="q" autofocus oninput="atualiza()" onkeydown="if(event.key==='Enter'){ir.click()}">
</div>
<div class="btns">
<a id="ir" target="_blank">Pesquisa OIOgle</a>
<a class="jw" href="https://www.jw.org/pt" target="_blank">www.jw.org</a>
</div>
</div>

<div class="trends">
<h3>Pesquisas em alta</h3>
<a class="trend" href="#"><span>anjos da guarda</span></a>
<a class="trend" href="#"><span>loterias sorteio mega sena</span></a>
<a class="trend" href="#"><span>terremotos na venezuela</span></a>
<a class="trend" href="#"><span>amazon luna</span></a>
<a class="trend" href="#"><span>futebol copa</span></a>
</div>

<footer>Brasil</footer>

<script>
let motor='duck'; const filtro='-igreja -paróquia -missa -padre -bispo -pastor -culto -templo -"primeira eucaristia" -"novena" -evangélico';
const ir=document.getElementById('ir'); const q=document.getElementById('q');
function atualiza(){ const v=q.value.trim(); const base=v||'Itatiba'; const enc=encodeURIComponent(base+' '+filtro); let url=''; if(motor==='duck')url='https://duckduckgo.com/html/?q='+enc+'&kl=br-pt'; if(motor==='brave')url='https://search.brave.com/search?q='+enc; if(motor==='google')url='https://www.google.com/search?q='+enc; ir.href=url; }
function nova(){ q.value=''; q.focus(); atualiza(); toggleMenu(false); }
function home(){ nova(); }
function toggleMenu(f){ const m=document.getElementById('menu'); m.style.display=f===false?'none':(m.style.display==='block'?'none':'block'); }
function setCidade(c){ q.value=c+' '; q.focus(); atualiza(); toggleMenu(false); }
function trocarMotor(){ motor=motor==='duck'?'brave':motor==='brave'?'google':'duck'; alert('Motor: '+motor.toUpperCase()); atualiza(); toggleMenu(false); }
document.addEventListener('click',e=>{ if(!e.target.closest('.topbar')) toggleMenu(false); });
atualiza();
</script>
<script>(function(){var loc=location.href.replace(/#.*$/,"");var ATTR_NAMES=["data-product-id","data-productid","data-product_id","product-id","productid","product_id","data-source-entity-id","source-entity-id","source_entity_id","data-product","data-metadata","data-meta"];var DATASET_KEYS=["productId","productid","product_id","sourceEntityId","sourceentityid","source_entity_id","product","metadata","meta"];function readProductId(value){if(typeof value!=="string"||value.length===0)return null;if(/^[0-9]{6,}$/.test(value))return value;var match=value.match(/(?:product(?:_|-)?id|source(?:_|-)?entity(?:_|-)?id)["'=:\s]+([0-9]{6,})/i);return match?match[1]:null}function extractProductId(start){for(var node=start;node&&node!==document.body;node=node.parentElement){for(var i=0;i<ATTR_NAMES.length;i++){var attrValue=node.getAttribute&&node.getAttribute(ATTR_NAMES[i]);var attrProductId=readProductId(attrValue);if(attrProductId)return attrProductId}var dataset=node.dataset||null;if(dataset){for(var j=0;j<DATASET_KEYS.length;j++){var dataValue=dataset[DATASET_KEYS[j]];var dataProductId=readProductId(dataValue);if(dataProductId)return dataProductId}}}return null}document.addEventListener("click",function(e){var target=e.target instanceof Element?e.target:null;if(!target)return;var a=target.closest?target.closest("a[href]"):null;if(!a||!a.href||!/^https?:\/\//.test(a.href))return;if(a.href.replace(/#.*$/,"")===loc)return;var productId=extractProductId(target)||extractProductId(a);if(!productId)return;e.preventDefault();parent.postMessage({type:"ecto-artifact-link-click",productId:productId},"*")},true)})();</script></body></html>
